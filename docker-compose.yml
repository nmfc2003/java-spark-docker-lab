services:
  spark-master:
    image: spark:3.5.8
    container_name: java-spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./data:/opt/spark-data
      - ./output:/opt/spark-output

  spark-worker:
    image: spark:3.5.8
    container_name: java-spark-worker
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2G
      - spark://spark-master:7077
    ports:
      - "8081:8081"
    volumes:
      - ./data:/opt/spark-data
      - ./output:/opt/spark-output

  spark-client:
    build:
      context: .
    depends_on:
      - spark-master
      - spark-worker
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
    volumes:
      - ./data:/opt/spark-data
      - ./output:/opt/spark-output

  spark-client-dev:
    build:
      context: .
      dockerfile: docker/spark-client-dev.Dockerfile
    container_name: java-spark-client-dev
    depends_on:
      - spark-master
      - spark-worker
    working_dir: /workspace/java-spark-docker-lab
    command: ["tail", "-f", "/dev/null"]
    environment:
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_DRIVER_BIND_ADDRESS=0.0.0.0
      - SPARK_DRIVER_HOST=spark-client-dev
    ports:
      - "4040:4040"
    volumes:
      - ./:/workspace/java-spark-docker-lab
      - ./data:/opt/spark-data
      - ./output:/opt/spark-output
      - ./spark-events:/opt/spark-events

  spark-history-server:
    image: spark:3.5.8
    container_name: java-spark-history-server
    depends_on:
      - spark-master
      - spark-client-dev
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=file:/opt/spark-events -Dspark.history.ui.port=18080
    command:
      - /bin/bash
      - -lc
      - mkdir -p /opt/spark-events && /opt/spark/sbin/start-history-server.sh && tail -f /dev/null
    ports:
      - "18080:18080"
    volumes:
      - ./spark-events:/opt/spark-events
